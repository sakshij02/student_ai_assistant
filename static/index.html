<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedantu Study Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Vedantu brand tokens ───────────────────────────────────── */
    :root {
      --font: 'Nunito', sans-serif;
      --v-purple:       #4A1C96;
      --v-purple-mid:   #6B3FA0;
      --v-purple-light: #9B6DCA;
      --v-green:        #00CC8F;
      --v-green-dark:   #00A874;
      --transition:     0.22s ease;
    }

    [data-theme="dark"] {
      --bg:           #0d0b14;
      --surface:      #150f24;
      --surface-2:    #1c1530;
      --border:       #2a2040;
      --text:         #ede8f8;
      --text-muted:   #8b7faa;
      --text-faint:   #3d3458;
      --accent:       #7c4dcc;
      --accent-2:     #00CC8F;
      --accent-soft:  rgba(124, 77, 204, 0.14);
      --accent-glow:  rgba(124, 77, 204, 0.28);
      --chip-bg:      #1c1530;
      --chip-text:    #8b7faa;
      --weak-bg:      rgba(220, 60, 80, 0.1);
      --weak-text:    #ff7088;
      --strong-bg:    rgba(0, 204, 143, 0.1);
      --strong-text:  #00CC8F;
      --score-low:    #ff7088;
      --score-mid:    #f5a623;
      --score-high:   #00CC8F;
      --tool-bg:      #150f24;
      --tool-border:  #2a2040;
      --scrollbar:    #2a2040;
      --input-bg:     #150f24;
    }

    [data-theme="light"] {
      --bg:           #f5f0ff;
      --surface:      #ffffff;
      --surface-2:    #f0eafa;
      --border:       #e0d5f5;
      --text:         #1a0a38;
      --text-muted:   #6b5a8a;
      --text-faint:   #c8b8e8;
      --accent:       #4A1C96;
      --accent-2:     #00A874;
      --accent-soft:  rgba(74, 28, 150, 0.07);
      --accent-glow:  rgba(74, 28, 150, 0.18);
      --chip-bg:      #f0eafa;
      --chip-text:    #6b5a8a;
      --weak-bg:      rgba(220, 60, 80, 0.06);
      --weak-text:    #c0334a;
      --strong-bg:    rgba(0, 168, 116, 0.07);
      --strong-text:  #007a58;
      --score-low:    #c0334a;
      --score-mid:    #c07a00;
      --score-high:   #007a58;
      --tool-bg:      #f8f4ff;
      --tool-border:  #e0d5f5;
      --scrollbar:    #e0d5f5;
      --input-bg:     #ffffff;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: background var(--transition), border-color var(--transition);
    }

    /* Vedantu brand header */
    .brand-bar {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .vedantu-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Vedantu "V" geometric mark — purple triangle shape */
    .v-mark {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .logo-tagline {
      font-size: 9.5px;
      font-weight: 500;
      color: var(--accent-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .theme-toggle {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all var(--transition);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .theme-toggle:hover { border-color: var(--accent); }

    /* Sidebar body */
    .sidebar-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }

    /* Student card */
    .student-card {
      background: var(--accent-soft);
      border: 1px solid var(--accent-glow);
      border-radius: 12px;
      padding: 14px;
    }

    .student-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .student-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .student-info { min-width: 0; }

    .student-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .student-id-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-2);
      background: rgba(0, 204, 143, 0.12);
      border: 1px solid rgba(0, 204, 143, 0.25);
      border-radius: 4px;
      padding: 1px 6px;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .student-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .meta-chip {
      font-size: 10.5px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Section label */
    .section-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 7px;
    }

    .topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      background: var(--chip-bg);
      color: var(--chip-text);
      border: 1px solid var(--border);
    }

    .chip.weak   { background: var(--weak-bg);   color: var(--weak-text);   border-color: currentColor; }
    .chip.strong { background: var(--strong-bg);  color: var(--strong-text); border-color: currentColor; }

    /* Performance bars */
    .perf-item { margin-bottom: 9px; }

    .perf-header {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    .perf-bar {
      height: 5px;
      background: var(--surface-2);
      border-radius: 99px;
      overflow: hidden;
    }

    .perf-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
    }

    /* Suggested queries */
    .query-list { display: flex; flex-direction: column; gap: 5px; }

    .query-btn {
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: var(--font);
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition: all var(--transition);
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .query-btn::before {
      content: '→';
      color: var(--accent);
      font-size: 11px;
      margin-top: 1px;
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .query-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }

    .query-btn:hover::before { transform: translateX(2px); }

    .query-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Chat area ──────────────────────────────────────────────── */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Chat header */
    .chat-header {
      padding: 14px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .chat-header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      animation: pulse-dot 2.4s ease infinite;
    }

    .chat-header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .chat-header-title span {
      color: var(--text);
      font-weight: 700;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      pointer-events: none;
      animation: fadeIn 0.5s ease;
    }

    .empty-logo-wrap {
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .empty-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-faint);
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 5px;
      animation: slideUp 0.28s ease;
      max-width: 680px;
    }

    .message.user      { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-faint);
    }

    .message-bubble {
      padding: 11px 16px;
      border-radius: 14px;
      line-height: 1.65;
      font-size: 13px;
      font-weight: 400;
    }

    .message.user .message-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
      font-weight: 500;
    }

    .message.assistant .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      white-space: pre-wrap;
    }

    /* Tool events */
    .tool-events {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-self: flex-start;
      max-width: 380px;
    }

    .tool-event {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: 7px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      animation: slideUp 0.2s ease;
    }

    .tool-event.done {
      color: var(--accent-2);
      border-color: rgba(0, 204, 143, 0.3);
      background: rgba(0, 204, 143, 0.07);
    }

    .tool-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .tool-event.active .tool-dot { animation: pulse 1s infinite; }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 0.9em;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }

    /* ── Input area ─────────────────────────────────────────────── */
    .input-area {
      padding: 14px 36px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 8px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #query-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      resize: none;
      max-height: 110px;
      min-height: 22px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #query-input::placeholder { color: var(--text-faint); }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition), transform var(--transition);
    }

    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      margin-top: 6px;
      font-size: 10.5px;
      font-weight: 400;
      color: var(--text-faint);
      text-align: center;
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Vedantu brand bar -->
    <div class="brand-bar">
      <div class="vedantu-logo">
        <!-- Vedantu geometric "V" mark in brand purple + green -->
        <svg class="v-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="16,4 30,26 16,20 2,26" fill="#4A1C96"/>
          <polygon points="16,20 30,26 23,26" fill="#00CC8F" opacity="0.9"/>
        </svg>
        <div class="logo-text">
          <div class="logo-name">Vedantu</div>
          <div class="logo-tagline">Study Assistant</div>
        </div>
      </div>
      <button class="theme-toggle" id="theme-btn" title="Toggle theme">☀️</button>
    </div>

    <div class="sidebar-body">

      <!-- Student card -->
      <div class="student-card">
        <div class="student-top">
          <div class="student-avatar" id="student-avatar">A</div>
          <div class="student-info">
            <div class="student-name" id="student-name">Loading...</div>
            <div class="student-id-badge" id="student-id-badge">ID: —</div>
          </div>
        </div>
        <div class="student-meta-row" id="student-meta-row"></div>
      </div>

      <!-- Weak topics -->
      <div>
        <div class="section-label">Weak Topics</div>
        <div class="topic-chips" id="weak-chips"></div>
      </div>

      <!-- Strong topics -->
      <div>
        <div class="section-label">Strong Topics</div>
        <div class="topic-chips" id="strong-chips"></div>
      </div>

      <!-- Performance -->
      <div>
        <div class="section-label">Subject Performance</div>
        <div id="perf-bars"></div>
      </div>

      <!-- Suggested queries — auto-trigger on click -->
      <div>
        <div class="section-label">Quick Questions</div>
        <div class="query-list" id="query-list">
          <button class="query-btn" data-query="I am weak in Algebra. What should I do next?">I am weak in Algebra. What should I do next?</button>
          <button class="query-btn" data-query="What should I study this week?">What should I study this week?</button>
          <button class="query-btn" data-query="Which topic should I prioritize first?">Which topic should I prioritize first?</button>
          <button class="query-btn" data-query="I have a Maths test coming up. Help me prepare.">I have a Maths test coming up. Help me prepare.</button>
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Chat area ── -->
  <main class="chat-area">

    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <div class="chat-header-title">Chatting with <span id="header-name">Arjun</span>'s Study Assistant</div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-logo-wrap">
          <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.25">
            <polygon points="16,4 30,26 16,20 2,26" fill="#4A1C96"/>
            <polygon points="16,20 30,26 23,26" fill="#00CC8F" opacity="0.9"/>
          </svg>
        </div>
        <div class="empty-title">What would you like to study?</div>
        <div class="empty-sub">Ask about your weak areas, upcoming tests, or study plan.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="query-input"
          placeholder="Ask your study assistant..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
  const STUDENT_ID = 'S123';
  let isStreaming = false;

  /* ── Theme toggle ──────────────────────────────────────────── */
  let isDark = true;
  document.getElementById('theme-btn').addEventListener('click', () => {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  });

  /* ── Load student profile ──────────────────────────────────── */
  async function loadStudent() {
    try {
      const res = await fetch(`/student/${STUDENT_ID}`);
      const d = await res.json();

      document.getElementById('student-avatar').textContent = d.name[0];
      document.getElementById('student-name').textContent   = d.name;
      document.getElementById('student-id-badge').textContent = `ID: ${d.student_id}`;
      document.getElementById('header-name').textContent    = d.name;

      const metaRow = document.getElementById('student-meta-row');
      [`Grade ${d.grade}`, d.board, `${d.daily_study_time_minutes} min/day`].forEach(label => {
        const c = document.createElement('span');
        c.className = 'meta-chip';
        c.textContent = label;
        metaRow.appendChild(c);
      });

      const weakEl = document.getElementById('weak-chips');
      d.weak_topics.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'chip weak';
        chip.textContent = t;
        weakEl.appendChild(chip);
      });

      const strongEl = document.getElementById('strong-chips');
      d.strong_topics.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'chip strong';
        chip.textContent = t;
        strongEl.appendChild(chip);
      });

      const perfEl = document.getElementById('perf-bars');
      d.subject_performance.forEach(s => {
        const pct   = s.overall_score_percentage;
        const color = pct < 55 ? 'var(--score-low)' : pct < 75 ? 'var(--score-mid)' : 'var(--score-high)';
        perfEl.innerHTML += `
          <div class="perf-item">
            <div class="perf-header">
              <span>${s.subject}</span>
              <span style="color:${color};font-weight:600">${pct}%</span>
            </div>
            <div class="perf-bar">
              <div class="perf-fill" style="width:${pct}%;background:${color}"></div>
            </div>
          </div>`;
      });
    } catch(e) { console.error('Failed to load student:', e); }
  }

  /* ── Quick question buttons — auto-trigger ─────────────────── */
  document.getElementById('query-list').addEventListener('click', e => {
    const btn = e.target.closest('.query-btn');
    if (!btn || isStreaming) return;
    const query = btn.dataset.query;
    if (query) triggerQuery(query);
  });

  /* Send a query directly without user needing to press Enter */
  function triggerQuery(text) {
    const input = document.getElementById('query-input');
    input.value = text;
    autoResize(input);
    sendMessage();
  }

  /* ── Chat helpers ──────────────────────────────────────────── */
  const getMessages = () => document.getElementById('chat-messages');

  function hideEmpty() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function appendUserMessage(text) {
    hideEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'message user';
    wrap.innerHTML = `<div class="message-label">You</div>
      <div class="message-bubble">${escapeHtml(text)}</div>`;
    getMessages().appendChild(wrap);
    scrollBottom();
  }

  function createAssistantMessage() {
    hideEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.innerHTML = `<div class="message-label">Vedantu Assistant</div>`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    wrap.appendChild(bubble);
    getMessages().appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function createToolContainer() {
    const c = document.createElement('div');
    c.className = 'tool-events';
    getMessages().appendChild(c);
    return c;
  }

  function addToolEvent(container, label, done = false) {
    const el = document.createElement('div');
    el.className = `tool-event ${done ? 'done' : 'active'}`;
    el.innerHTML = `<div class="tool-dot"></div><span>${escapeHtml(label)}</span>`;
    container.appendChild(el);
    scrollBottom();
    return el;
  }

  function scrollBottom() {
    const el = getMessages();
    el.scrollTop = el.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setQueryBtnsDisabled(disabled) {
    document.querySelectorAll('.query-btn').forEach(b => b.disabled = disabled);
  }

  /* ── Send message ──────────────────────────────────────────── */
  async function sendMessage() {
    if (isStreaming) return;

    const input = document.getElementById('query-input');
    const query = input.value.trim();
    if (!query) return;

    isStreaming = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    setQueryBtnsDisabled(true);

    appendUserMessage(query);

    let toolContainer  = null;
    let toolEventEls   = {};
    let responseBubble = null;
    let responseText   = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: STUDENT_ID, query }),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === 'tool_call') {
            if (!toolContainer) toolContainer = createToolContainer();
            const el = addToolEvent(toolContainer, event.label, false);
            toolEventEls[event.tool] = el;
          }

          else if (event.type === 'tool_result') {
            const el = toolEventEls[event.tool];
            if (el) {
              el.classList.remove('active');
              el.classList.add('done');
              el.querySelector('.tool-dot').style.animation = 'none';
            }
          }

          else if (event.type === 'response_chunk') {
            if (!responseBubble) responseBubble = createAssistantMessage();
            responseText += event.text;
            responseBubble.innerHTML = escapeHtml(responseText) + '<span class="cursor"></span>';
            scrollBottom();
          }

          else if (event.type === 'done') {
            if (responseBubble) responseBubble.innerHTML = escapeHtml(responseText);
          }
        }
      }
    } catch (err) {
      if (!responseBubble) responseBubble = createAssistantMessage();
      responseBubble.textContent = 'Something went wrong. Please try again.';
      console.error(err);
    }

    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    setQueryBtnsDisabled(false);
    document.getElementById('query-input').focus();
  }

  /* ── Keyboard handling ─────────────────────────────────────── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  /* ── Init ──────────────────────────────────────────────────── */
  loadStudent();
</script>
